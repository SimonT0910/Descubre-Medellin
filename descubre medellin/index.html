<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Descubre Medellín - Inicio</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="main-header">
        <div class="container header-content">
            <div class="logo">
                <div class="logo-top">
                    <img src="images/localizacion.png" alt="logo">
                    <h1>Descubre Medellín</h1>
                </div>
                <p class="logo-subtitle">Los mejores lugares del Valle de Aburrá</p>
            </div>
            <nav class="user-nav">
            <button class="btn-primary" id="btnPublicar">+ Publicar Lugar</button>
            <div class="profile-icon" id="profileMenu">
                 <img src="images/perfil.png" alt="perfil">
                 <span class="user-nombre-header" id="userNombreHeader"></span>
            <div class="dropdown-menu" id="dropdownMenu">
                <span class="dropdown-user-info" id="dropdownUserInfo"></span>
                 <a href="#" id="btnCerrarSesion">Cerrar Sesión</a>
        </div>
    </div>
</nav>
    </header>

    <main class="container">
        <section class="search-section">
            <div class="search-bar">
                <span><img src="images/buscar.png" class="search-icon" alt="buscar"></span>
                <input type="text" id="searchInput" placeholder="Buscar por nombre o descripción...">
            </div>
            <div class="filters">
                <select id="filterCategory">
                    <option value="todas">Todas las categorías</option>
                    <option value="restaurante">Restaurantes</option>
                    <option value="cafe">Cafés</option>
                    <option value="parque">Parques</option>
                    <option value="bar">Bares</option>
                    <option value="museo">Museos</option>
                    <option value="otros">Otros</option>
                </select>
                <select id="filterPrice">
                    <option value="">Cualquier precio</option>
                    <option value="$">$ (Económico)</option>
                    <option value="$$">$$ (Medio)</option>
                    <option value="$$$">$$$ (Alto)</option>
                </select>
                <button class="btn-favoritos-toggle" id="btnVerFavoritos">
                    <span class="fav-icon-btn">❤️</span> Favoritos <span class="fav-badge" id="favBadge">0</span>
                </button>
            </div>
        </section>

        <!-- PANEL FAVORITOS -->
        <div class="favoritos-panel" id="favoritosPanel" style="display:none">
            <div class="favoritos-header">
                <h3>❤️ Mis Favoritos</h3>
                <button class="favoritos-cerrar" id="btnCerrarFavoritos">&times;</button>
            </div>
            <div class="favoritos-lista" id="favoritosLista">
                <p class="sin-favoritos">Aún no has guardado ningún lugar.</p>
            </div>
        </div>

        <p id="contadorLugares" class="contador">Cargando lugares...</p>
        <section class="places-grid" id="placesGrid"></section>
    </main>

    <!-- MODAL PUBLICAR LUGAR -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <h2>Publicar nuevo lugar</h2>
                <button class="modal-close" id="modalClose">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="inputNombre">Nombre del lugar <span class="required">*</span></label>
                    <input type="text" id="inputNombre" placeholder="Ej: Café El Patio" required maxlength="80">
                    <span class="error-msg" id="errorNombre"></span>
                </div>
                <div class="form-group">
                    <label for="inputCategoria">Categoría <span class="required">*</span></label>
                    <select id="inputCategoria" required>
                        <option value="">Selecciona una categoría</option>
                        <option value="restaurante">Restaurante</option>
                        <option value="cafe">Café</option>
                        <option value="parque">Parque</option>
                        <option value="bar">Bar</option>
                        <option value="museo">Museo</option>
                        <option value="otros">Otros</option>
                    </select>
                    <span class="error-msg" id="errorCategoria"></span>
                </div>
                <div class="form-group">
                    <label for="inputDescripcion">Descripción <span class="required">*</span></label>
                    <textarea id="inputDescripcion" placeholder="Describe el lugar brevemente..." required maxlength="200" rows="3"></textarea>
                    <span class="char-count" id="charCount">0 / 200</span>
                    <span class="error-msg" id="errorDescripcion"></span>
                </div>
                <div class="form-group">
                    <label for="inputUbicacion">Ubicación <span class="required">*</span></label>
                    <input type="text" id="inputUbicacion" placeholder="Ej: Laureles, Medellín" required maxlength="100">
                    <span class="error-msg" id="errorUbicacion"></span>
                </div>
                <div class="form-group">
                    <label for="inputPrecio">Rango de precio <span class="required">*</span></label>
                    <select id="inputPrecio" required>
                        <option value="">Selecciona un rango</option>
                        <option value="$">$ — Económico</option>
                        <option value="$$">$$ — Medio</option>
                        <option value="$$$">$$$ — Alto</option>
                    </select>
                    <span class="error-msg" id="errorPrecio"></span>
                </div>
                <div class="form-group">
                    <label for="inputImagen">URL de imagen</label>
                    <input type="url" id="inputImagen" placeholder="https://images.unsplash.com/...">
                    <span class="error-msg" id="errorImagen"></span>
                    <div class="image-preview-wrap" id="imagePreviewWrap">
                        <img id="imagePreview" src="" alt="Vista previa">
                    </div>
                </div>
                <div class="form-actions">
                    <button class="btn-cancel" id="btnCancelar">Cancelar</button>
                    <button class="btn-primary" id="btnGuardar">Publicar lugar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL DETALLES -->
    <div class="modal-overlay" id="modalDetalles">
        <div class="modal modal-detalles">
            <div class="modal-header">
                <h2 id="detalleNombre"></h2>
                <button class="modal-close" id="detallesClose">&times;</button>
            </div>
            <div class="modal-body">
                <div class="detalle-imagen-wrap">
                    <img id="detalleImagen" src="" alt="">
                    <div class="detalle-no-imagen" id="detalleNoImagen">Sin imagen</div>
                </div>
                <div class="detalle-info">
                    <div class="detalle-badges">
                        <span class="detalle-badge categoria-badge" id="detalleCat"></span>
                        <span class="detalle-badge precio-badge" id="detallePrecio"></span>
                    </div>
                    <p class="detalle-descripcion" id="detalleDesc"></p>
                    <p class="detalle-ubicacion">📍 <span id="detalleUbicacion"></span></p>
                    <p class="detalle-estrellas" id="detalleEstrellas"></p>
                </div>

                <div class="comentarios-section">
                    <h3 class="comentarios-titulo">Comentarios</h3>
                    <div class="comentarios-lista" id="comentariosLista">
                        <p class="sin-comentarios" id="sinComentarios">Aún no hay comentarios. ¡Sé el primero!</p>
                    </div>
                    <div class="comentario-form">
                        <div class="form-group">
                            <input type="text" id="comentarioAutor" placeholder="Tu nombre" maxlength="50">
                        </div>
                        <div class="form-group">
                            <textarea id="comentarioTexto" placeholder="Escribe tu comentario..." maxlength="300" rows="3"></textarea>
                            <span class="char-count" id="charComentario">0 / 300</span>
                        </div>
                        <span class="error-msg" id="errorComentario"></span>
                        <button class="btn-primary btn-comentar" id="btnComentar">Publicar comentario</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>

    <!-- MODAL EDITAR LUGAR -->
<div class="modal-overlay" id="modalEditar">
    <div class="modal">
        <div class="modal-header">
            <h2>Editar lugar</h2>
            <button class="modal-close" id="editarClose">&times;</button>
        </div>
        <div class="modal-body">
            <input type="hidden" id="editarId">
            <div class="form-group">
                <label for="editarNombre">Nombre del lugar <span class="required">*</span></label>
                <input type="text" id="editarNombre" placeholder="Ej: Café El Patio" required maxlength="80">
                <span class="error-msg" id="editarErrorNombre"></span>
            </div>
            <div class="form-group">
                <label for="editarCategoria">Categoría <span class="required">*</span></label>
                <select id="editarCategoria" required>
                    <option value="">Selecciona una categoría</option>
                    <option value="restaurante">Restaurante</option>
                    <option value="cafe">Café</option>
                    <option value="parque">Parque</option>
                    <option value="bar">Bar</option>
                    <option value="museo">Museo</option>
                    <option value="otros">Otros</option>
                </select>
                <span class="error-msg" id="editarErrorCategoria"></span>
            </div>
            <div class="form-group">
                <label for="editarDescripcion">Descripción <span class="required">*</span></label>
                <textarea id="editarDescripcion" placeholder="Describe el lugar brevemente..." required maxlength="200" rows="3"></textarea>
                <span class="char-count" id="editarCharCount">0 / 200</span>
                <span class="error-msg" id="editarErrorDescripcion"></span>
            </div>
            <div class="form-group">
                <label for="editarUbicacion">Ubicación <span class="required">*</span></label>
                <input type="text" id="editarUbicacion" placeholder="Ej: Laureles, Medellín" required maxlength="100">
                <span class="error-msg" id="editarErrorUbicacion"></span>
            </div>
            <div class="form-group">
                <label for="editarPrecio">Rango de precio <span class="required">*</span></label>
                <select id="editarPrecio" required>
                    <option value="">Selecciona un rango</option>
                    <option value="$">$ — Económico</option>
                    <option value="$$">$$ — Medio</option>
                    <option value="$$$">$$$ — Alto</option>
                </select>
                <span class="error-msg" id="editarErrorPrecio"></span>
            </div>
            <div class="form-group">
                <label for="editarImagen">URL de imagen</label>
                <input type="url" id="editarImagen" placeholder="https://images.unsplash.com/...">
                <span class="error-msg" id="editarErrorImagen"></span>
                <div class="image-preview-wrap" id="editarImagePreviewWrap">
                    <img id="editarImagePreview" src="" alt="Vista previa">
                </div>
            </div>
            <div class="form-actions">
                <button class="btn-cancel" id="editarCancelar">Cancelar</button>
                <button class="btn-primary" id="editarGuardar">Guardar cambios</button>
            </div>
        </div>
    </div>
</div>
</body>
</html>
